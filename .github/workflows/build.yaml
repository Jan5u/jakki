name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    runs-on: windows-2025-vs2026
    env:
      VCPKG_ENABLE_METRICS: 0
    steps:
      - uses: actions/checkout@v6

      - name: Setup NSIS
        uses: repolevedavaj/install-nsis@v1.1.0
        with:
          nsis-version: '3.11'

      - name: Setup CMake
        uses: lukka/get-cmake@latest

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgJsonGlob: 'vcpkg.json'

      - name: Run CMake
        uses: lukka/run-cmake@v10
        with:
          configurePreset: 'ci-vcpkg-release'
          buildPreset: 'ci-vcpkg-build'
          packagePreset: 'ci-vcpkg-package'
